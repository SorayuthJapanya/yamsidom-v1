server {
    listen 80;
    listen [::]:80;

    root /usr/share/nginx/html;
    index index.html;

    server_name yamwisdom.com www.yamwisdom.com;

    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: ws: wss: data: blob: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'self';" always;
    add_header Permissions-Policy "interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 1024M;

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    location ~* \.pdf$ {
        root /usr/share/nginx/html;
        types { application/pdf pdf; }
        default_type application/pdf;
        add_header Content-Disposition "inline";
        try_files $uri =404;
    }

    location /api/v1/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream http://server:5001;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

}